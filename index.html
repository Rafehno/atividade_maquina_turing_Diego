<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Máquina de Turing - Exame Ninja</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .tape {
            font-family: monospace;
            font-size: 28px;
            letter-spacing: 10px;
        }

        .pointer {
            font-family: monospace;
            font-size: 28px;
            letter-spacing: 10px;
            white-space: pre;
        }
    </style>

</head>

<body class="bg-dark text-light">
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold">
                Simulador de Máquina de Turing
            </h1>
            <p class="lead text-secondary">
                Verifica se um ninja possui equilíbrio entre
                <span class="badge bg-danger">T</span>
                <span class="badge bg-primary">N</span>
                <span class="badge bg-success">G</span>
            </p>
        </div>
        <div class="mb-3">
            <input id="entrada" class="form-control" placeholder="Ex: TTNNGG">
        </div>
        <button class="btn btn-primary" onclick="iniciar()">Executar</button>
        <hr>
        <h5>Estado: <span id="estado">q0</span></h5>
        <div class="tape mt-3" id="tape"></div>
        <div class="pointer" id="pointer"></div>
        <hr>
        <h5>Log</h5>
        <pre id="log"></pre>
    </div>
    <script src="config.js"></script>
</body>

</html>
